<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07080d" />
    <meta name="description" content="XD程序化房间生成器：基于随机种子快速生成房间布局、路径连接与主题化场景，支持实时预览、参数调节和 2D 区域编辑。" />
    <title>XD程序化房间生成器</title>

    <meta name="author" content="Majid Manzarpour" />
    <link rel="author" href="https://x.com/majidmanzarpour" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%B0%3C/text%3E%3C/svg%3E" />

    <!-- Social share (Open Graph + Twitter) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="XD程序化房间生成器" />
    <meta property="og:description" content="XD程序化房间生成器：基于随机种子快速生成房间布局、路径连接与主题化场景，支持实时预览、参数调节和 2D 区域编辑。" />
    <meta property="og:url" content="https://procedural-dungeon.netlify.app/" />
    <meta property="og:image" content="https://procedural-dungeon.netlify.app/og.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="俯视视角下由发光区域和路径组成的程序化场景，笼罩在主题化光影氛围中。" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="XD程序化房间生成器" />
    <meta name="twitter:description" content="XD程序化房间生成器：基于随机种子快速生成房间布局、路径连接与主题化场景，支持实时预览、参数调节和 2D 区域编辑。" />
    <meta name="twitter:image" content="https://procedural-dungeon.netlify.app/og.jpg" />
    <meta name="twitter:site" content="@majidmanzarpour" />
    <meta name="twitter:creator" content="@majidmanzarpour" />

    <link rel="stylesheet" href="./src/ui/styles.css" />
  </head>
  <body>
    <!-- control + telemetry panel -->
    <div id="panel">
      <button id="collapse" aria-label="收起面板" title="收起">–</button>
      <div class="head">
        <div class="brand"><span>场景锻炉</span></div>
        <h1 id="dname">—</h1>
        <div id="dsub">生成中…</div>
      </div>

      <div class="sec hero-controls">
        <label><span class="lab"><span>种子</span></span>
          <div class="row">
            <input id="seed" type="number" value="1337" aria-label="种子">
            <button class="btn" id="dice" title="随机种子" aria-label="随机种子">⚄</button>
          </div>
        </label>
        <button class="btn primary" id="forge">生成场景</button>
      </div>

      <div class="sec">
        <span class="lab"><span>题材</span><b id="vSetting">自动</b></span>
        <div class="chips compact" id="settingChips">
          <button class="chip on" data-s="auto">自动</button>
          <button class="chip" data-s="dungeon">遗迹</button>
          <button class="chip" data-s="hospital">医院</button>
        </div>
      </div>

      <div class="sec">
        <span class="lab"><span>色调</span><b id="vTheme">自动</b></span>
        <div class="chips palette" id="paletteChips">
          <button class="chip on" data-p="auto">自动</button>
          <button class="chip" data-p="ancient">暖灰</button>
          <button class="chip" data-p="molten">暖橙</button>
          <button class="chip" data-p="frost">冷蓝</button>
          <button class="chip" data-p="grim">暗绿</button>
          <button class="chip" data-p="verdant">青绿</button>
          <button class="chip" data-p="sterile">冷白</button>
          <button class="chip" data-p="abandoned">灰绿</button>
          <button class="chip" data-p="emergency">警示红</button>
        </div>
      </div>

      <div class="sec sliders">
        <label class="sl"><span class="lab"><span>区域数量</span><b id="vRooms">42</b></span>
          <input type="range" id="rooms" min="12" max="80" value="42" aria-label="区域数量"></label>
        <label class="sl"><span class="lab"><span>回环率</span><b id="vLoops">15%</b></span>
          <input type="range" id="loops" min="0" max="40" value="15" aria-label="回环概率"></label>
        <label class="sl"><span class="lab"><span>装饰密度</span><b id="vDecor">60%</b></span>
          <input type="range" id="decor" min="0" max="100" value="60" aria-label="装饰密度"></label>
      </div>

      <div class="sec display-options">
        <label class="tog"><input type="checkbox" id="tAnim" checked> 生成动画</label>
        <label class="tog"><input type="checkbox" id="tPost" checked> 后期特效</label>
        <label class="tog hidden-option"><input type="checkbox" id="tGraph"> 结构叠加</label>
        <label class="tog hidden-option"><input type="checkbox" id="tHeat"> 强度热力图</label>
      </div>

      <div class="stats ui-hidden" aria-hidden="true">
        <b id="sRooms">—</b><b id="sEdges">—</b><b id="sCrit">—</b><b id="sTiles">—</b><b id="sLights">—</b><b id="sMs">—</b><b id="sCalls">—</b><b id="sTris">—</b><b id="sFps">—</b>
      </div>
    </div>

    <div class="sec editor-sec">
        <input type="checkbox" id="tEditor" checked hidden>
        <span class="lab editor-title"><span id="editorTitleText">2D 区域编辑器</span><b id="editorStatus">同步中</b><button class="mini-btn" id="editorCollapse" type="button">折叠</button><button class="mini-btn" id="editorFullscreen" type="button">全屏</button><button class="mini-btn" id="editorExit" type="button">完成 ✓</button></span>
        <div class="editor-canvas-wrap">
          <canvas id="editorCanvas" class="editor-canvas" width="620" height="460" aria-label="2D 区域编辑器"></canvas>
        </div>
        <div class="editor-panel-resize editor-panel-resize-left" data-editor-resize="left" title="拖拽调整编辑器宽度"></div>
        <div class="editor-panel-resize editor-panel-resize-bottom" data-editor-resize="bottom" title="拖拽调整编辑器高度"></div>
        <div class="editor-panel-resize editor-panel-resize-corner" data-editor-resize="corner" title="拖拽调整编辑器大小"></div>
    </div>

    <div id="editorMenu" class="editor-menu">
      <button data-action="add-room" data-menu="blank">添加区域</button>
      <button data-action="delete" data-menu="room">删除区域</button>
      <button data-action="lock" data-menu="room">锁定/解锁</button>
      <button data-action="connect" data-menu="room">连接路径到这里</button>
      <button data-action="entrance" data-menu="room">设为起点</button>
      <button data-action="boss" data-menu="room">设为终点</button>
      <button data-action="secret" data-menu="room">设为/取消密室</button>
      <button data-action="add-bend" data-menu="link">添加转折点</button>
      <button data-action="reset-link" data-menu="link">重置路径形状</button>
      <button data-action="narrower" data-menu="link">路径变窄</button>
      <button data-action="wider" data-menu="link">路径变宽</button>
      <button data-action="delete-link" data-menu="link">删除路径</button>
      <button data-action="delete-bend" data-menu="bend">删除转折点</button>
      <button data-action="reset-door" data-menu="door">重置门槽点</button>
    </div>

    <div id="hints"><b>拖拽</b> 平移 · <b>滚轮</b> 缩放 · <b>Shift+拖拽</b> 旋转 · <b>E</b> 编辑布局 · <b>R</b> 重新生成 · <b>T</b> 切换色调 · <b>Shift+T</b> 切换题材 · <b>G</b> 结构 · <b>H</b> 强度图 · <b>P</b> 后期 · <b>空格</b> 跳过动画</div>

    <button id="editModeBtn" type="button" title="进入布局编辑模式（E）">✏ 编辑布局 <span class="key">E</span></button>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
