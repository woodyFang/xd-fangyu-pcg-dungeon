<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>楼梯 PCG 规则测试塔</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,"Microsoft YaHei",system-ui,sans-serif;background:#080b12;color:#eef4ff}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(circle at top,#16223a 0,#080b12 42rem);min-height:100vh}
    main{width:min(1500px,calc(100% - 32px));margin:auto;padding:28px 0 48px}
    header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:20px}
    h1{font-size:clamp(25px,3vw,40px);line-height:1.08;margin:0 0 8px}
    .subtitle{margin:0;color:#aebbd1;max-width:850px;line-height:1.65}
    .status{white-space:nowrap;border:1px solid #2c3d58;border-radius:999px;padding:10px 16px;background:#111a2a;color:#96a8c5}
    .status.pass{color:#8df0bd;border-color:#2f8d63;background:#10271f}
    .status.fail{color:#ff9c9c;border-color:#9b4343;background:#2b161a}
    .summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:18px}
    .metric,.panel,.floor-card{background:rgba(15,22,35,.92);border:1px solid #263249;border-radius:14px;box-shadow:0 16px 40px rgba(0,0,0,.18)}
    .metric{padding:15px 17px}.metric strong{display:block;font-size:26px}.metric span{font-size:12px;color:#91a1b9}
    .layout{display:grid;grid-template-columns:minmax(360px,.78fr) minmax(600px,1.6fr);gap:18px;align-items:start}
    .panel{padding:18px;position:sticky;top:16px}
    .panel h2,.maps h2{font-size:16px;margin:0 0 14px;color:#dce8fb}
    .rules{display:grid;gap:8px}
    .rule{display:grid;grid-template-columns:24px 1fr;gap:9px;padding:10px;border-radius:10px;background:#0b111d;border:1px solid #202c41}
    .rule .mark{font-weight:800;color:#ff8181}.rule.pass .mark{color:#76e7aa}
    .rule strong{font-size:13px}.rule p{font-size:11px;color:#8394ae;margin:3px 0 0;line-height:1.45}
    .legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-top:16px;padding-top:14px;border-top:1px solid #243049;color:#aab8cd;font-size:11px}
    .legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:-2px}
    .maps{min-width:0}.scene-shell{position:relative;height:min(72vh,760px);min-height:560px;border:1px solid #27344b;border-radius:14px;overflow:hidden;background:#07101b;box-shadow:0 16px 40px rgba(0,0,0,.22)}
    #scene3d{position:absolute;inset:0}#scene3d canvas{display:block;width:100%;height:100%}
    .scene-tools{position:absolute;z-index:3;left:14px;top:14px;display:flex;flex-wrap:wrap;gap:7px;padding:8px;border:1px solid #30405c;border-radius:11px;background:rgba(7,12,22,.78);backdrop-filter:blur(12px)}
    .scene-tools button{border:1px solid #34435c;border-radius:8px;background:#131d2d;color:#afbdd2;padding:8px 11px;cursor:pointer;font:inherit;font-size:11px}
    .scene-tools button:hover,.scene-tools button.on{color:#fff;border-color:#d28b3c;background:#4a3018}
    .scene-hint{position:absolute;z-index:3;right:14px;bottom:12px;margin:0;padding:8px 11px;border-radius:9px;background:rgba(7,12,22,.72);color:#9caec6;font-size:11px;backdrop-filter:blur(10px)}
    .connector-list{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:14px}
    .connector{padding:12px;border:1px solid #27344b;border-radius:11px;background:#0c1320}
    .connector strong{font-size:13px}.connector p{margin:6px 0 0;color:#8fa0b8;font-size:11px;line-height:1.55}
    @media(max-width:1050px){.layout{grid-template-columns:1fr}.panel{position:static}.summary{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:700px){main{width:min(100% - 20px,1500px)}header{align-items:flex-start;flex-direction:column}.connector-list{grid-template-columns:1fr}.scene-shell{min-height:520px}}
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>楼梯 PCG 规则测试塔</h1>
        <p class="subtitle">独立固定测试地图：不测试房间语义、装饰、战斗和普通地图质量，只核对楼梯体量、楼板洞口、墙体/护栏归属与跨层连通。</p>
      </div>
      <div id="overallStatus" class="status">正在生成测试塔…</div>
    </header>
    <section id="summary" class="summary"></section>
    <div class="layout">
      <aside class="panel">
        <h2>规则验收结果</h2>
        <div id="rules" class="rules"></div>
        <div class="legend">
          <span><i style="background:#2a3549"></i>楼板</span>
          <span><i style="background:#59647a"></i>墙体</span>
          <span><i style="background:#f2a94a"></i>梯段</span>
          <span><i style="background:#4cc9f0"></i>楼板洞口</span>
          <span><i style="background:#56d78b"></i>落地区</span>
          <span><i style="background:#ff6b6b"></i>楼梯墙</span>
          <span><i style="background:#70e1dc"></i>护栏</span>
        </div>
      </aside>
      <section class="maps">
        <h2>3D 楼梯结构测试塔</h2>
        <div class="scene-shell">
          <div id="scene3d" aria-label="可旋转的三维楼梯规则测试地图"></div>
          <div id="sceneTools" class="scene-tools">
            <button class="on" data-stair-focus="all">整体塔</button>
            <button data-stair-focus="0">#1 贴墙 L 型</button>
            <button data-stair-focus="1">#2 宽直跑</button>
            <button data-stair-focus="2">#3 开放区 L 型</button>
          </div>
          <p class="scene-hint">按住鼠标左键旋转 · 右键平移 · 滚轮缩放</p>
        </div>
        <div id="connectorList" class="connector-list"></div>
      </section>
    </div>
  </main>
  <script type="module" src="/src/stair-rule-test.js"></script>
</body>
</html>
